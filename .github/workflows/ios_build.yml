name: Build iOS App

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Godot & Export Templates
        run: |
          GODOT_VERSION="4.3-stable"
          
          # Download Godot Engine
          wget -q https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_macos.universal.zip
          unzip -q Godot_v${GODOT_VERSION}_macos.universal.zip
          mv Godot.app /Applications/Godot.app
          
          # Download Export Templates
          wget -q https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_export_templates.tpz
          unzip -q Godot_v${GODOT_VERSION}_export_templates.tpz
          mkdir -p ~/Library/Application\ Support/Godot/export_templates/4.3.stable/
          mv templates/* ~/Library/Application\ Support/Godot/export_templates/4.3.stable/

      - name: Export Xcode Project
        run: |
          mkdir -p export/iOS
          # Import all assets first
          /Applications/Godot.app/Contents/MacOS/Godot --headless --verbose --editor --quit || true
          # Export for iOS
          /Applications/Godot.app/Contents/MacOS/Godot --headless --verbose --export-debug "iOS" export/iOS/AmongUs3D
          
      - name: Build IPA (Unsigned)
        run: |
          cd export/iOS
          sed -i '' 's/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g' AmongUs3D.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' AmongUs3D.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_IDENTITY = ".*";/CODE_SIGN_IDENTITY = "";/g' AmongUs3D.xcodeproj/project.pbxproj
          sed -i '' 's/"CODE_SIGN_IDENTITY\[sdk=iphoneos\*\]" = ".*";/"CODE_SIGN_IDENTITY[sdk=iphoneos*]" = "";/g' AmongUs3D.xcodeproj/project.pbxproj
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = ".*";/PROVISIONING_PROFILE_SPECIFIER = "";/g' AmongUs3D.xcodeproj/project.pbxproj
          xcodebuild -project AmongUs3D.xcodeproj -scheme AmongUs3D -configuration Debug -destination 'generic/platform=iOS' build CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY="" CODE_SIGN_STYLE=Manual PROVISIONING_PROFILE_SPECIFIER="" CONFIGURATION_BUILD_DIR=$(pwd)/build
          mkdir -p Payload
          cp -r build/AmongUs3D.app Payload/
          zip -q -r AmongUs3D.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AmongUs3D-iOS-Unsigned
          path: export/iOS/AmongUs3D.ipa
